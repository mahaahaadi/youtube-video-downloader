<section class="skeleton" aria-busy="true" aria-label="Loading video analysis">
  <div class="skeleton__status">
    <span class="skeleton__pulse"></span>
    <p>Fetching real stream data from YouTube…</p>
  </div>

  <div class="skeleton__layout">
    <div class="skeleton__preview u-animate-in u-animate-in-delay-1">
      <p-skeleton width="100%" height="180px" borderRadius="12px" />
      <p-skeleton width="40%" height="1.25rem" class="skeleton__gap" />
      <p-skeleton width="85%" height="1rem" />
      <p-skeleton width="60%" height="1rem" class="skeleton__gap-sm" />
    </div>

    <div class="skeleton__panel u-animate-in u-animate-in-delay-2">
      <div class="skeleton__card">
        <p-skeleton width="120px" height="1rem" />
        <p-skeleton width="100%" height="2.5rem" borderRadius="8px" class="skeleton__gap" />
        <p-skeleton width="100%" height="2.5rem" borderRadius="8px" />
      </div>

      <div class="skeleton__tabs">
        <p-skeleton width="30%" height="2rem" borderRadius="999px" />
        <p-skeleton width="28%" height="2rem" borderRadius="999px" />
        <p-skeleton width="26%" height="2rem" borderRadius="999px" />
      </div>

      <div class="skeleton__fields">
        <p-skeleton width="100%" height="3.5rem" borderRadius="10px" />
        <p-skeleton width="100%" height="3.5rem" borderRadius="10px" />
        <p-skeleton width="100%" height="3.5rem" borderRadius="10px" />
      </div>

      <div class="skeleton__footer">
        <div class="skeleton__footer-meta">
          <p-skeleton width="4rem" height="0.75rem" />
          <p-skeleton width="5rem" height="1rem" />
          <p-skeleton width="3.5rem" height="0.75rem" />
          <p-skeleton width="4.5rem" height="1rem" />
        </div>
        <p-skeleton width="100%" height="3rem" borderRadius="10px" />
      </div>
    </div>
  </div>
</section>
